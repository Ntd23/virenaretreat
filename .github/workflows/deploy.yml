# Deploys the Virena Retreat Laravel application to the production server.
name: DeployVirenaretreat

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            set -e

            cd /home/virenaretreat/main

            git fetch origin
            git reset --hard origin/main

            prepare_laravel_storage() {
              mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
              mkdir -p storage/framework/cache/data/d8/61

              WEB_USER="virenaretreat"

              if ! id "$WEB_USER" >/dev/null 2>&1; then
                echo "Configured web user '$WEB_USER' does not exist on the server."
                exit 1
              fi

              WEB_GROUP="$(id -gn "$WEB_USER")"
              if [ "$(id -u)" -eq 0 ]; then
                chown -R "$WEB_USER:$WEB_GROUP" storage bootstrap/cache
              elif [ "$(id -un)" != "$WEB_USER" ]; then
                echo "Deploy user is not root; skipping ownership update."
              fi

              chmod -R 777 storage bootstrap/cache
            }

            prepare_laravel_storage
            ls -ld storage storage/framework storage/framework/cache storage/framework/cache/data storage/framework/cache/data/d8 storage/framework/cache/data/d8/61 bootstrap/cache
            php -r "file_put_contents('storage/framework/cache/data/.deploy-write-test', 'ok'); unlink('storage/framework/cache/data/.deploy-write-test');"

            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-interaction

            php artisan migrate --force

            php artisan optimize:clear
            prepare_laravel_storage
            ls -ld storage storage/framework storage/framework/cache storage/framework/cache/data storage/framework/cache/data/d8 storage/framework/cache/data/d8/61 bootstrap/cache
            php artisan optimize
