# Deploys the Virena Retreat Laravel application to the production server.
name: DeployVirenaretreat

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd /home/virenaretreat/main

            git fetch origin
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader

            mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

            WEB_USER="$(id -un)"
            if id virenaretreat >/dev/null 2>&1; then
              WEB_USER="virenaretreat"
            elif id www >/dev/null 2>&1; then
              WEB_USER="www"
            elif id nginx >/dev/null 2>&1; then
              WEB_USER="nginx"
            elif id apache >/dev/null 2>&1; then
              WEB_USER="apache"
            fi

            WEB_GROUP="$(id -gn "$WEB_USER")"
            if [ "$(id -u)" -eq 0 ]; then
              chown -R "$WEB_USER:$WEB_GROUP" storage bootstrap/cache
            fi
            chmod -R ug+rwX storage bootstrap/cache

            php artisan migrate --force

            php artisan optimize:clear
            php artisan optimize
